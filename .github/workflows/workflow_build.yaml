name: Deploy Lambda ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  build:
    name: Package and deploy Lambda ZIP
    runs-on: ubuntu-latest
    environment: certified-builder-py
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Prepare package directories
        run: |
          rm -rf dist
          mkdir -p dist/package

      - name: Build Lambda ZIP
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            python:3.13-slim \
            bash -lc '
              set -euo pipefail
              apt-get update >/dev/null
              apt-get install -y curl zip >/dev/null
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="/root/.local/bin:$PATH"
              uv export --format requirements.txt --no-hashes > /tmp/requirements.txt
              python -m pip install --upgrade pip >/dev/null
              python -m pip install --no-cache-dir -r /tmp/requirements.txt -t dist/package >/dev/null
              cp -R src dist/package/
              cp lambda_function.py pyproject.toml uv.lock dist/package/
              cd dist/package
              zip -qr ../lambda.zip .
            '

      - name: Deploy Lambda ZIP
        run: |
          aws lambda update-function-code \
            --function-name tech-floripa-certificates-api-dev \
            --zip-file fileb://dist/lambda.zip
          aws lambda wait function-updated \
            --function-name tech-floripa-certificates-api-dev

      - name: Complete
        run: |
          echo "Lambda ZIP deployed successfully"
